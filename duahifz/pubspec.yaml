name: duahifz
description: A Quran Dua memorization app with AI-powered speech recognition, inspired by Tarteel.ai.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # Audio Recording & Playback
  record: ^5.0.4
  audioplayers: ^5.2.1
  permission_handler: ^11.1.0
  
  # AI/ML - ONNX Runtime for Quran recognition
  onnxruntime: ^0.1.2
  
  # State Management
  provider: ^6.1.1
  
  # Utilities
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  flutter_tts: ^3.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/fonts/
    - assets/models/
  
  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
