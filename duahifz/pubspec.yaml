name: duahifz
description: "DuaHifz - A privacy-first app for memorizing Duas through active recitation with real-time word-by-word matching."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.3
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/duas/sample_duas.json
    - assets/models/silero_vad.onnx
    - assets/models/tiny-ar-quran-decoder.int8.onnx
    - assets/models/tiny-ar-quran-encoder.int8.onnx
    - assets/models/tokens.txt
    - assets/icon/icon.png
  
  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#4CAF50"
  min_sdk_android: 21