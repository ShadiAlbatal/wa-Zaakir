plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.duahifz.app"
    compileSdk flutter.compileSdkVersion
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.duahifz.app"
        minSdk 24
        targetSdk flutter.targetSdkVersion
        versionCode flutter.versionCode
        versionName flutter.versionName
        
        // Enable native code for sherpa-onnx integration
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    
    // Configure asset copying for models
    android.applicationVariants.all { variant ->
        variant.mergeAssetsProvider.configure {
            dependsOn(copyModels)
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0'
    // sherpa-onnx will be added as a local dependency or via JitPack
    // implementation 'com.k2fsa.sherpa:onnx:1.0.0' // When published
}

// Task to copy models from project root to Android assets
tasks.register('copyModels', Copy) {
    from '../../assets/models'
    into 'src/main/assets/models'
    include '**/*.onnx', '**/*.txt'
}
